<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHIP-8 Emulator</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { color: #00d4ff; }
        #display { image-rendering: pixelated; border: 2px solid #00d4ff; background: #000; }
        button { background: #00d4ff; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; }
        button:hover { background: #00a8cc; }
        .btn-secondary { background: #e94560; }
        .status { margin-top: 10px; font-family: monospace; }
        .controls { margin: 20px 0; }
        input[type="file"] { display: none; }
        label { background: #00d4ff; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>
    <h1>CHIP-8 Emulator</h1>
    
    <canvas id="display" width="640" height="320"></canvas>
    
    <div class="controls">
        <label for="rom-input">Load ROM File</label>
        <input type="file" id="rom-input" accept=".ch8,.bin">
        <button id="demo-btn">Load Demo</button>
        <button id="reset-btn" class="btn-secondary">Reset</button>
    </div>
    
    <div class="status">
        <div>PC: <span id="pc">0x200</span> | I: <span id="ir">0x000</span></div>
    </div>

    <script type="module">
        import init, { Chip8Wasm } from './pkg/chip8.js';
        
        const canvas = document.getElementById('display');
        const ctx = canvas.getContext('2d');
        const pcSpan = document.getElementById('pc');
        const irSpan = document.getElementById('ir');
        
        let chip8;
        
        await init();
        chip8 = new Chip8Wasm();
        chip8.reset();
        
        // Simple game loop
        function run() {
            chip8.update();
            render();
            updateStatus();
            requestAnimationFrame(run);
        }
        
        function render() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 640, 320);
            ctx.fillStyle = '#fff';
            
            const pixels = chip8.get_display();
            const SCALE = 10;
            for (let y = 0; y < 32; y++) {
                for (let x = 0; x < 64; x++) {
                    if (pixels[y * 64 + x] > 0) {
                        ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
                    }
                }
            }
        }
        
        function updateStatus() {
            pcSpan.textContent = '0x' + chip8.get_pc().toString(16).toUpperCase();
            irSpan.textContent = '0x' + chip8.get_index().toString(16).toUpperCase();
        }
        
        document.getElementById('demo-btn').addEventListener('click', () => {
            chip8.reset();
            chip8.load_demo();
        });
        
        document.getElementById('reset-btn').addEventListener('click', () => {
            chip8.reset();
        });
        
        document.getElementById('rom-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const buffer = await file.arrayBuffer();
                chip8.reset();
                chip8.load_rom(new Uint8Array(buffer));
            }
        });
        
        run();
    </script>
</body>
</html>
