<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP-8 Emulator Debug</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: monospace;
            padding: 20px;
        }
        .error {
            background: #e94560;
            padding: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
        #display {
            image-rendering: pixelated;
            border: 2px solid #00d4ff;
            background: #000;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            background: #16213e;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>CHIP-8 Emulator Debug</h1>
    <canvas id="display" width="640" height="320"></canvas>
    <div class="status" id="status">Initializing...</div>
    <div class="error" id="error"></div>
    
    <script type="module">
        import init, { Chip8Wasm } from './pkg/chip8.js';
        
        const statusDiv = document.getElementById('status');
        const errorDiv = document.getElementById('error');
        const canvas = document.getElementById('display');
        const ctx = canvas.getContext('2d');
        
        function log(msg) {
            statusDiv.textContent += '\n' + msg;
            console.log(msg);
        }
        
        log('Starting...');
        
        try {
            log('Calling init()...');
            await init();
            log('init() complete');
            
            log('Creating Chip8Wasm...');
            const chip8 = new Chip8Wasm();
            log('Chip8Wasm created');
            
            log('Checking display...');
            const pixels = chip8.get_display();
            log(`Display buffer: ${pixels.length} bytes`);
            
            // Check what pixels are set before demo
            const initialPixels = pixels.filter(p => p > 0).length;
            log(`Initial pixels set: ${initialPixels}`);
            
            log('Calling load_demo()...');
            chip8.load_demo();
            log('load_demo() complete');
            
            log('Checking PC after load_demo...');
            const pc = chip8.get_pc();
            log(`PC = 0x${pc.toString(16)}`);
            
            log('Calling step() once...');
            chip8.step();
            log('step() complete');
            
            log('Checking PC after step...');
            const pc2 = chip8.get_pc();
            log(`PC = 0x${pc2.toString(16)}`);
            
            // Execute a few more steps
            for (let i = 0; i < 5; i++) {
                chip8.step();
            }
            
            log('Checking display after all steps...');
            const pixels2 = chip8.get_display();
            log(`Display buffer: ${pixels2.length} bytes`);
            const setPixels = pixels2.filter(p => p > 0).length;
            log(`Pixels set: ${setPixels}`);
            
            // Render
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 640, 320);
            ctx.fillStyle = '#fff';
            
            const SCALE = 10;
            for (let y = 0; y < 32; y++) {
                for (let x = 0; x < 64; x++) {
                    if (pixels2[y * 64 + x] > 0) {
                        ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
                    }
                }
            }
            
            log('DONE! Check canvas for output.');
            
        } catch (err) {
            log('ERROR: ' + err.message);
            if (err.stack) {
                log('Stack: ' + err.stack);
            }
            errorDiv.textContent = 'Error: ' + err.message + '\n\n' + (err.stack || '');
        }
    </script>
</body>
</html>
